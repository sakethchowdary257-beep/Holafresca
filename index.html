<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hola Fresca - Have It Fresh</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(180deg, #f0f9ff, #ffffff);
  color: #1a1a1a;
}

/* LOADER */
#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #0ea5e9;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  font-size: 2rem;
  font-family: 'Playfair Display', serif;
  z-index: 9999;
}

/* HERO */
.hero {
  height: 100vh;
  background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
              url('https://images.unsplash.com/photo-1497051788611-2c64812349a3') center/cover;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: #ffffff;
  text-align: center;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 3.2rem;
}

button {
  padding: 12px 22px;
  margin: 10px;
  border-radius: 30px;
  border: none;
  background: #0ea5e9;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #0284c7;
  transform: translateY(-2px);
}

/* MENU */
.menu {
  padding: 50px 20px;
  text-align: center;
}

.menu h2 {
  font-family: 'Playfair Display', serif;
  color: #0284c7;
}

.menu-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
  margin-top: 20px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}

.card h3 {
  color: #0ea5e9;
}

.item {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px dashed #ddd;
}

/* GALLERY */
.gallery {
  padding: 50px;
  text-align: center;
}

.gallery img {
  width: 260px;
  border-radius: 12px;
  margin: 10px;
}

/* FOOTER */
footer {
  background: #0ea5e9;
  color: white;
  padding: 20px;
  text-align: center;
}
</style>
</head>

<body>

<div id="loader">Hola Fresca ❄️</div>

<div class="hero">
  <h1>Have It Fresh 🍦</h1>
  <p>Gelato • Mojitos • Chill Vibes</p>

  <button onclick="callNow()">Call</button>
  <button onclick="whatsapp()">WhatsApp</button>
  <button onclick="map()">Location</button>
</div>

<div class="menu">
  <h2>🍽️ Our Menu</h2>

  <div class="menu-grid">

    <div class="card">
      <h3>🍦 Gelato</h3>
      <div class="item"><span>Single Scoop</span><span>₹99</span></div>
    </div>

    <div class="card">
      <h3>🥤 Mojitos</h3>
      <div class="item"><span>Blue Curacao</span><span>₹179</span></div>
      <div class="item"><span>Green Apple</span><span>₹179</span></div>
      <div class="item"><span>Watermelon</span><span>₹179</span></div>
    </div>

    <div class="card">
      <h3>🍔 Burgers</h3>
      <div class="item"><span>BBQ Chicken</span><span>₹270</span></div>
      <div class="item"><span>Mexican Cheese</span><span>₹240</span></div>
    </div>

    <div class="card">
      <h3>🍕 Pizza</h3>
      <div class="item"><span>Chicken-65</span><span>₹390</span></div>
      <div class="item"><span>Margherita</span><span>₹340</span></div>
    </div>

  </div>
</div>

<div class="gallery">
  <h2>📸 Gallery</h2>
  <img src="https://images.unsplash.com/photo-1563805042-7684c019e1cb">
  <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
</div>

<footer>
  Hola Fresca - Have It Fresh ❄️
</footer>

<script>
// LOADER
window.onload = () => {
  document.getElementById("loader").style.display = "none";
};

// BUTTONS
function callNow() {
  window.location.href = "tel:7396831475";
}

function whatsapp() {
  window.open("https://wa.me/917396831475");
}

function map() {
  window.open("https://www.google.com/maps/search/?api=1&query=Hola+Fresca+Vijayawada");
}
</script>

</body>
</html>
